<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text</title>
    <meta name="theme-color" content="#2f2e3a">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="editor-page">
    <!-- ─── Écran d'accueil (première visite) ─── -->
    <div id="welcomeOverlay" style="display:none">
        <div class="welcome-card">
            <h2 class="welcome-title">Text</h2>
            <p class="welcome-sub">L'éditeur</p>
            <p class="welcome-desc">Comment souhaitez-vous utiliser l'application ?</p>
            <div class="welcome-actions">
                <button class="welcome-btn primary" id="welcomeUse">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                    Utiliser dans le navigateur
                </button>
                <button class="welcome-btn" id="welcomeInstall">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v13m0 0-4-4m4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
                    Télécharger l'application
                </button>
            </div>
            <p class="welcome-note" id="welcomeNote"></p>
        </div>
    </div>
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>
    <header class="header">
        <div class="container">
            <a href="../index.html" style="text-decoration: none; color: inherit;">
                <h1 class="logo">Text</h1>
            </a>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <p class="tagline" style="margin-bottom: 0;">L'éditeur</p>
                <button class="dark-mode-toggle" id="darkModeToggle" title="Basculer en mode nuit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun-icon" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main" id="main-content">
        <!-- Barre supérieure avec toolbar intégrée -->
        <div class="top-bar">
            <!-- Lecteur YouTube compact -->
            <div class="top-bar-youtube">
                <div class="top-bar-youtube-header">
                    <span>Musique</span>
                    <button class="youtube-add-btn" id="youtubeAddBtn" title="Ajouter une piste">+</button>
                    <button class="youtube-manage-btn" id="youtubeManageBtn" title="Gérer les pistes">
                        <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                    <button class="youtube-toggle" id="youtubeToggle" title="Réduire/Agrandir">−</button>
                </div>
                <div class="top-bar-youtube-content" id="youtubeContent">
                    <!-- Conteneur caché pour l'API YouTube -->
                    <div id="ytApiContainer" style="position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;"></div>
                    <!-- Lecteur custom style SoundCloud -->
                    <div class="sc-player" id="scPlayer">
                        <button class="sc-skip-btn" id="scPrevBtn" title="Piste précédente" aria-label="Piste précédente">
                            <!-- Bouton précédent style SoundCloud : barre + triangle gauche -->
                            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
                                <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
                            </svg>
                        </button>
                        <button class="sc-play-btn" id="scPlayBtn" title="Lecture / Pause" aria-label="Lecture / Pause">
                            <svg class="sc-icon-play" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="sc-icon-pause" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button class="sc-skip-btn" id="scNextBtn" title="Piste suivante" aria-label="Piste suivante">
                            <!-- Bouton suivant style SoundCloud : triangle droit + barre -->
                            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
                                <path d="M6 18l8.5-6L6 6v12zm8.5-6v6H17V6h-2.5z"/>
                            </svg>
                        </button>
                        <div class="sc-info">
                            <span class="sc-title">Lofi Hip Hop Radio</span>
                            <div class="sc-wave">
                                <div class="sc-bars" id="scBars">
                                    <span></span><span></span><span></span><span></span><span></span><span></span>
                                </div>
                            </div>
                        </div>
                        <div class="sc-right">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="flex-shrink:0;opacity:0.6"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                            <input type="range" class="sc-volume" id="scVolume" min="0" max="100" value="80" title="Volume">
                        </div>
                    </div>
                </div>
            </div>
            <!-- Boutons d'action -->
            <div class="top-bar-actions">
                <button class="wp-button sidebar-toggle-btn" id="sidebarToggleBtn" title="Afficher/masquer les articles">Articles</button>
                <button class="wp-button" id="loadBtn">Importer</button>
                <button class="wp-button" id="addBtn">Ajouter</button>
                <button class="wp-button primary" id="saveBtn">Enregistrer</button>
            </div>
        </div>

        <div class="editor-container" id="editorContainer">
            <!-- Barre latérale des articles -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2 class="sidebar-title">Mes articles</h2>
                    <button class="new-article-btn" id="newArticleBtn" title="Nouvel article">+</button>
                </div>
                <div class="articles-list" id="articlesList">
                    <div class="no-articles">Aucun article sauvegardé</div>
                </div>
            </aside>

            <!-- Zone principale de l'éditeur -->
            <div class="editor-main">
                <div class="editor-wrapper">
                    <!-- Informations de l'article -->
                    <div class="article-info">
                        <input 
                            type="text" 
                            id="articleSubject" 
                            class="article-subject" 
                            placeholder="Ajouter un titre"
                            maxlength="100"
                        >
                    </div>

                    <!-- Barre d'outils -->
                    <div class="toolbar editor-toolbar">
                        <select class="toolbar-select" id="formatSelect">
                            <option value="p">Paragraphe</option>
                            <option value="h1">Titre 1</option>
                            <option value="h2">Titre 2</option>
                            <option value="h3">Titre 3</option>
                            <option value="h4">Titre 4</option>
                            <option value="h5">Titre 5</option>
                            <option value="h6">Titre 6</option>
                            <option value="blockquote">Citation</option>
                            <option value="pre">Code</option>
                        </select>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn" data-command="bold" title="Gras (Ctrl+B)"><strong>B</strong></button>
                        <button class="toolbar-btn" data-command="italic" title="Italique (Ctrl+I)"><em>I</em></button>
                        <button class="toolbar-btn" data-command="underline" title="Souligné (Ctrl+U)"><u>U</u></button>
                        <button class="toolbar-btn" data-command="strikeThrough" title="Barré"><s>S</s></button>
                        <div class="toolbar-separator"></div>
                        <div class="color-picker-wrapper">
                            <button class="toolbar-btn" title="Couleur du texte" onclick="document.getElementById('textColor').click()">A</button>
                            <input type="color" id="textColor" class="color-input">
                        </div>
                        <div class="color-picker-wrapper">
                            <button class="toolbar-btn" title="Couleur de fond" onclick="document.getElementById('bgColor').click()">🎨</button>
                            <input type="color" id="bgColor" class="color-input">
                        </div>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn" data-command="insertUnorderedList" title="Liste à puces">•</button>
                        <button class="toolbar-btn" data-command="insertOrderedList" title="Liste numérotée">1.</button>
                        <button class="toolbar-btn" data-command="outdent" title="Réduire le retrait">◁</button>
                        <button class="toolbar-btn" data-command="indent" title="Augmenter le retrait">▷</button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn" data-command="justifyLeft" title="Aligner à gauche">⬅</button>
                        <button class="toolbar-btn" data-command="justifyCenter" title="Centrer">↔</button>
                        <button class="toolbar-btn" data-command="justifyRight" title="Aligner à droite">➡</button>
                        <button class="toolbar-btn" data-command="justifyFull" title="Justifier">⬌</button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn" id="linkBtn" title="Insérer un lien">🔗</button>
                        <button class="toolbar-btn" id="unlinkBtn" data-command="unlink" title="Supprimer le lien">🔓</button>
                        <button class="toolbar-btn" id="imageBtn" title="Insérer une image">🖼️</button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn" data-command="undo" title="Annuler (Ctrl+Z)">↶</button>
                        <button class="toolbar-btn" data-command="redo" title="Rétablir (Ctrl+Y)">↷</button>
                        <button class="toolbar-btn" data-command="removeFormat" title="Supprimer le formatage">✖</button>
                        <button class="toolbar-btn" id="sourceBtn" title="Voir le code HTML">&lt;/&gt;</button>
                    </div>

                    <!-- Zone d'édition -->
                    <div class="editor-area" id="editor" contenteditable="true">
                        <p>Commencez à écrire ou tapez / pour choisir un bloc</p>
                    </div>

                    <!-- Zone de sortie -->
                    <div class="status-message" id="statusMessage"></div>
                </div>
            </div>


        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <nav class="footer-nav">
                <a href="a-propos.html" class="footer-link"></a>
                <a href="contact.html" class="footer-link"></a>
                <a href="auteur.html" class="footer-link"></a>
                <a href="mentions-legales.html" class="footer-link"></a>
            </nav>
            <p class="footer-copyright">© 2026 Text - Tous droits réservés</p>
        </div>
    </footer>

    <script src="publication.js"></script>
    <script src="pwa.js"></script>
    <script src="musique.js"></script>
    <!-- Export Word .docx -->
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <!-- Import Word .docx -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <!-- API IFrame YouTube pour piloter volume + lecture -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
    // ─── Écran d'accueil ───
    (function() {
        var overlay = document.getElementById('welcomeOverlay');
        if (!overlay) return;

        // Ne plus montrer si déjà choisi
        if (localStorage.getItem('scribouillart_welcomed')) return;

        overlay.style.display = 'flex';

        var deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
        });

        document.getElementById('welcomeUse').addEventListener('click', function() {
            localStorage.setItem('scribouillart_welcomed', '1');
            overlay.classList.add('welcome-out');
            setTimeout(function() { overlay.style.display = 'none'; }, 400);
        });

        document.getElementById('welcomeInstall').addEventListener('click', function() {
            var note = document.getElementById('welcomeNote');
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        localStorage.setItem('scribouillart_welcomed', '1');
                        overlay.classList.add('welcome-out');
                        setTimeout(function() { overlay.style.display = 'none'; }, 400);
                    }
                    deferredPrompt = null;
                });
            } else {
                // Navigateur non compatible ou déjà installé
                note.textContent = 'Sur Chrome : Menu ⋮ → « Installer l’application ». Sur iOS : Partager → Sur l’écran d’accueil.';
            }
        });
    })();
    </script>
</body>
</html>
